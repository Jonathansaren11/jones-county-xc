name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build backend Linux binary
        working-directory: ./backend
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o xc-backend .

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add server to known_hosts with timeout and retry
          for i in 1 2 3; do
            if ssh-keyscan -T 10 -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "Successfully added server to known_hosts"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 2
          done

          chmod 644 ~/.ssh/known_hosts

          # Verify SSH connection
          ssh -o BatchMode=yes -o ConnectTimeout=10 ubuntu@"$SERVER_IP" "echo 'SSH connection successful'"

      - name: Copy frontend build to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          rsync -avz --delete \
            ./frontend/dist/ \
            ubuntu@"$SERVER_IP":/var/www/jones-county-xc/

      - name: Copy backend binary and deploy script to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          ssh ubuntu@"$SERVER_IP" "mkdir -p ~/jones-county-xc-backend"
          rsync -avz \
            ./backend/xc-backend \
            ubuntu@"$SERVER_IP":~/jones-county-xc-backend/xc-backend
          rsync -avz \
            ./deploy.sh \
            ubuntu@"$SERVER_IP":~/deploy.sh

      - name: Run deployment script on server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          ssh ubuntu@"$SERVER_IP" "chmod +x ~/deploy.sh && ~/deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
